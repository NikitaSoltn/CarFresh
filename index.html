<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CarFresh</title>
    <link rel="stylesheet" href="style.css">
</head>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.5/xlsx.full.min.js"></script>
<body>
    <h1>Инфа по авто</h1>
    <!-- Форма с input типа file -->
    <form enctype="multipart/form-data">
        <label for="excelFileInput">Какой файл</label>
        <input type="file" id="excelFileInput" accept="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"/>
        <button type="button" onclick="loadExcel()">Загрузить</button>
    </form>
    <table id="dataTable" border="1"></table>
    <br />
    <button onclick="saveExcel()">Сохранить</button>
    
    <script src="script.js"></script>
</body>
</html>
